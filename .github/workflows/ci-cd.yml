name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: go-api

jobs:
  # ----------------------------------------------------------------
  # Job 1: Build & Test
  # ----------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: self-hosted          # Self-hosted runner บน Cloud Shell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: api/go.sum

      - name: Run tests
        working-directory: api
        run: go test -mod=vendor ./... -v -race

  # ----------------------------------------------------------------
  # Job 2: Build & Push Docker Image
  # ----------------------------------------------------------------
  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  # ----------------------------------------------------------------
  # Job 3: Deploy to Minikube (via self-hosted runner)
  # ----------------------------------------------------------------
  deploy:
    name: Deploy to Minikube
    needs: docker-build-push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/api-deployment.yaml

      - name: Update image in deployment
        run: |
          kubectl set image deployment/go-api \
            go-api=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/go-api --timeout=120s

      - name: Smoke test (health check)
        run: |
          NODE_IP=$(minikube ip)
          curl --fail --retry 5 --retry-delay 3 \
            "http://${NODE_IP}:30080/readyz"
